<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">

  <rect width="900" height="440" fill="#0f1117" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="15" fill="#e2e8f0" font-weight="bold" letter-spacing="2">COLUMN TRANSFORMER — PREPROCESSING PIPELINE</text>

  <text x="30" y="72" font-size="10" fill="#64748b" font-weight="bold" letter-spacing="1">INPUT FEATURES</text>
  <text x="310" y="72" font-size="10" fill="#64748b" font-weight="bold" letter-spacing="1">TRANSFORMER</text>
  <text x="560" y="72" font-size="10" fill="#64748b" font-weight="bold" letter-spacing="1">OUTPUT COLUMNS</text>

  <!-- INPUT CATEGORICAL -->
  <rect x="20" y="82" width="220" height="102" rx="6" fill="#1e2433" stroke="#f97316" stroke-width="1.2"/>
  <text x="30" y="100" font-size="10" fill="#f97316" font-weight="bold" letter-spacing="1">CATEGORICAL  (object)</text>
  <text x="30" y="119" font-size="11" fill="#cbd5e1">gender</text>
  <text x="30" y="137" font-size="11" fill="#cbd5e1">stress_level</text>
  <text x="30" y="155" font-size="11" fill="#cbd5e1">academic_work_impact</text>
  <text x="30" y="175" font-size="10" fill="#475569">3 columns</text>

  <!-- INPUT NUMERIC -->
  <rect x="20" y="198" width="220" height="168" rx="6" fill="#1e2433" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="30" y="216" font-size="10" fill="#22d3ee" font-weight="bold" letter-spacing="1">NUMERIC  (float / int)</text>
  <text x="30" y="234" font-size="11" fill="#cbd5e1">daily_screen_time_hours</text>
  <text x="30" y="252" font-size="11" fill="#cbd5e1">social_media_hours</text>
  <text x="30" y="270" font-size="11" fill="#cbd5e1">gaming_hours</text>
  <text x="30" y="288" font-size="11" fill="#cbd5e1">work_study_hours</text>
  <text x="30" y="306" font-size="11" fill="#cbd5e1">sleep_hours</text>
  <text x="30" y="324" font-size="11" fill="#cbd5e1">notifications_per_day</text>
  <text x="30" y="342" font-size="11" fill="#cbd5e1">app_opens_per_day</text>
  <text x="30" y="358" font-size="11" fill="#cbd5e1">weekend_screen_time</text>

  <!-- INPUT AGE -->
  <rect x="20" y="380" width="220" height="44" rx="6" fill="#1e2433" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="30" y="398" font-size="10" fill="#a78bfa" font-weight="bold" letter-spacing="1">AGE  (int)</text>
  <text x="30" y="416" font-size="11" fill="#cbd5e1">age  — multimodal subgroups</text>

  <!-- ARROWS IN -->
  <line x1="241" y1="133" x2="300" y2="133" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="241" y1="282" x2="300" y2="282" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <line x1="241" y1="402" x2="300" y2="402" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- TRANSFORMERS -->
  <rect x="302" y="109" width="190" height="48" rx="6" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <text x="397" y="130" text-anchor="middle" font-size="13" fill="#fb923c" font-weight="bold">OneHotEncoder</text>
  <text x="397" y="148" text-anchor="middle" font-size="10" fill="#9a3412">handle_unknown='ignore'</text>

  <rect x="302" y="258" width="190" height="48" rx="6" fill="#083344" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="397" y="279" text-anchor="middle" font-size="13" fill="#67e8f9" font-weight="bold">QuantileTransformer</text>
  <text x="397" y="297" text-anchor="middle" font-size="10" fill="#0e7490">output_distribution='normal'</text>

  <rect x="302" y="378" width="190" height="48" rx="6" fill="#2e1065" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="397" y="399" text-anchor="middle" font-size="13" fill="#c4b5fd" font-weight="bold">StandardScaler</text>
  <text x="397" y="417" text-anchor="middle" font-size="10" fill="#6d28d9">mean=0  ·  std=1</text>

  <!-- ARROWS OUT -->
  <line x1="493" y1="133" x2="552" y2="133" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="493" y1="282" x2="552" y2="282" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <line x1="493" y1="402" x2="552" y2="402" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- OUTPUT CATEGORICAL -->
  <rect x="554" y="82" width="220" height="102" rx="6" fill="#1e2433" stroke="#f97316" stroke-width="1.2"/>
  <text x="564" y="100" font-size="10" fill="#f97316" font-weight="bold" letter-spacing="1">EXPANDED  (one-hot)</text>
  <text x="564" y="119" font-size="11" fill="#cbd5e1">gender_Male / gender_Female</text>
  <text x="564" y="137" font-size="11" fill="#cbd5e1">stress_level_Low / _Med / _High</text>
  <text x="564" y="155" font-size="11" fill="#cbd5e1">academic_work_impact_...</text>
  <text x="564" y="175" font-size="10" fill="#475569">N expanded columns</text>

  <!-- OUTPUT NUMERIC -->
  <rect x="554" y="198" width="220" height="168" rx="6" fill="#1e2433" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="564" y="216" font-size="10" fill="#22d3ee" font-weight="bold" letter-spacing="1">SAME COLUMNS  (transformed)</text>
  <text x="564" y="234" font-size="11" fill="#cbd5e1">daily_screen_time_hours</text>
  <text x="564" y="252" font-size="11" fill="#cbd5e1">social_media_hours</text>
  <text x="564" y="270" font-size="11" fill="#cbd5e1">gaming_hours</text>
  <text x="564" y="288" font-size="11" fill="#cbd5e1">work_study_hours</text>
  <text x="564" y="306" font-size="11" fill="#cbd5e1">sleep_hours</text>
  <text x="564" y="324" font-size="11" fill="#cbd5e1">notifications_per_day</text>
  <text x="564" y="342" font-size="11" fill="#cbd5e1">app_opens_per_day</text>
  <text x="564" y="360" font-size="11" fill="#cbd5e1">weekend_screen_time</text>

  <!-- OUTPUT AGE -->
  <rect x="554" y="380" width="220" height="44" rx="6" fill="#1e2433" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="564" y="398" font-size="10" fill="#a78bfa" font-weight="bold" letter-spacing="1">SCALED</text>
  <text x="564" y="416" font-size="11" fill="#cbd5e1">age  →  mean=0  ·  std=1</text>

  <!-- MERGE -->
  <line x1="775" y1="133" x2="800" y2="133" stroke="#475569" stroke-width="1"/>
  <line x1="775" y1="282" x2="800" y2="282" stroke="#475569" stroke-width="1"/>
  <line x1="775" y1="402" x2="800" y2="402" stroke="#475569" stroke-width="1"/>
  <line x1="800" y1="133" x2="800" y2="402" stroke="#475569" stroke-width="1"/>
  <line x1="800" y1="268" x2="828" y2="268" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <rect x="830" y="238" width="58" height="58" rx="6" fill="#1a2744" stroke="#6366f1" stroke-width="1.8"/>
  <text x="859" y="261" text-anchor="middle" font-size="10" fill="#818cf8" font-weight="bold">numpy</text>
  <text x="859" y="277" text-anchor="middle" font-size="10" fill="#818cf8" font-weight="bold">array</text>
  <text x="859" y="291" text-anchor="middle" font-size="9" fill="#4338ca">→ model</text>

  <defs>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f97316" stroke-width="1.5"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
