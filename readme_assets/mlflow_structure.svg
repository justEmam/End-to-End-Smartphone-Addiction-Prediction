<svg width="860" height="460" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">

  <rect width="860" height="460" fill="#0f1117" rx="12"/>

  <text x="430" y="36" text-anchor="middle" font-size="15" fill="#e2e8f0" font-weight="bold" letter-spacing="2">MLFLOW EXPERIMENT STRUCTURE</text>
  <text x="430" y="54" text-anchor="middle" font-size="10" fill="#475569" letter-spacing="1">3 parent runs  ·  nested children per param combination  ·  best child bubbled to parent</text>

  <!-- experiment boundary -->
  <rect x="20" y="66" width="820" height="376" rx="10" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="36" y="84" font-size="10" fill="#334155" font-weight="bold" letter-spacing="1">EXPERIMENT:  screen_time_addiction</text>

  <!-- ── PARENT 1: Logistic Regression ── -->
  <rect x="40" y="94" width="240" height="330" rx="8" fill="#0d1f2d" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="40" y="94" width="240" height="32" rx="8" fill="#0c4a6e"/>
  <rect x="40" y="114" width="240" height="12" fill="#0c4a6e"/>
  <text x="160" y="114" text-anchor="middle" font-size="12" fill="#7dd3fc" font-weight="bold">logistic_regression</text>
  <text x="160" y="130" text-anchor="middle" font-size="9" fill="#38bdf8" letter-spacing="1">PARENT RUN</text>

  <!-- child rows LR -->
  <rect x="55" y="140" width="210" height="24" rx="4" fill="#0f2233" stroke="#1e3a50" stroke-width="1"/>
  <text x="65" y="156" font-size="9" fill="#64748b">C=0.1 · solver=lbfgs</text>

  <rect x="55" y="170" width="210" height="24" rx="4" fill="#0f2233" stroke="#1e3a50" stroke-width="1"/>
  <text x="65" y="186" font-size="9" fill="#64748b">C=0.5 · solver=lbfgs</text>

  <rect x="55" y="200" width="210" height="24" rx="4" fill="#0f2233" stroke="#1e3a50" stroke-width="1"/>
  <text x="65" y="216" font-size="9" fill="#64748b">C=1.0 · solver=lbfgs</text>

  <rect x="55" y="230" width="210" height="24" rx="4" fill="#0f2233" stroke="#1e3a50" stroke-width="1"/>
  <text x="65" y="246" font-size="9" fill="#64748b">C=0.1 · solver=saga</text>

  <rect x="55" y="260" width="210" height="24" rx="4" fill="#0f2233" stroke="#1e3a50" stroke-width="1"/>
  <text x="65" y="276" font-size="9" fill="#64748b">C=0.5 · solver=saga</text>

  <rect x="55" y="290" width="210" height="24" rx="4" fill="#0f2233" stroke="#1e3a50" stroke-width="1"/>
  <text x="65" y="306" font-size="9" fill="#64748b">C=1.0 · solver=saga</text>

  <!-- best child LR -->
  <rect x="55" y="326" width="210" height="32" rx="4" fill="#0c2d1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="65" y="342" font-size="9" fill="#22c55e" font-weight="bold">★  best child metrics</text>
  <text x="65" y="356" font-size="9" fill="#4ade80">bubbled up to parent run</text>

  <!-- model artifact LR -->
  <rect x="55" y="368" width="210" height="42" rx="4" fill="#1a1025" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="65" y="384" font-size="9" fill="#a78bfa">📦  model artifact logged</text>
  <text x="65" y="398" font-size="9" fill="#6d28d9">register from UI</text>
  <text x="65" y="406" font-size="8" fill="#4c1d95">→ assign Production / Staging</text>

  <!-- ── PARENT 2: SVM ── -->
  <rect x="310" y="94" width="240" height="330" rx="8" fill="#1a0f06" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="310" y="94" width="240" height="32" rx="8" fill="#7c2d12"/>
  <rect x="310" y="114" width="240" height="12" fill="#7c2d12"/>
  <text x="430" y="114" text-anchor="middle" font-size="12" fill="#fdba74" font-weight="bold">SVM</text>
  <text x="430" y="130" text-anchor="middle" font-size="9" fill="#fb923c" letter-spacing="1">PARENT RUN</text>

  <rect x="325" y="140" width="210" height="24" rx="4" fill="#1c0f05" stroke="#3d1a08" stroke-width="1"/>
  <text x="335" y="156" font-size="9" fill="#64748b">kernel=linear · C=0.1</text>

  <rect x="325" y="170" width="210" height="24" rx="4" fill="#1c0f05" stroke="#3d1a08" stroke-width="1"/>
  <text x="335" y="186" font-size="9" fill="#64748b">kernel=linear · C=0.5</text>

  <rect x="325" y="200" width="210" height="24" rx="4" fill="#1c0f05" stroke="#3d1a08" stroke-width="1"/>
  <text x="335" y="216" font-size="9" fill="#64748b">kernel=linear · C=1.0</text>

  <rect x="325" y="230" width="210" height="24" rx="4" fill="#1c0f05" stroke="#3d1a08" stroke-width="1"/>
  <text x="335" y="246" font-size="9" fill="#64748b">kernel=rbf · C=0.1</text>

  <rect x="325" y="260" width="210" height="24" rx="4" fill="#1c0f05" stroke="#3d1a08" stroke-width="1"/>
  <text x="335" y="276" font-size="9" fill="#64748b">kernel=rbf · C=0.5</text>

  <rect x="325" y="290" width="210" height="24" rx="4" fill="#1c0f05" stroke="#3d1a08" stroke-width="1"/>
  <text x="335" y="306" font-size="9" fill="#64748b">kernel=rbf · C=1.0</text>

  <rect x="325" y="326" width="210" height="32" rx="4" fill="#0c2d1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="335" y="342" font-size="9" fill="#22c55e" font-weight="bold">★  best child metrics</text>
  <text x="335" y="356" font-size="9" fill="#4ade80">bubbled up to parent run</text>

  <rect x="325" y="368" width="210" height="42" rx="4" fill="#1a1025" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="335" y="384" font-size="9" fill="#a78bfa">📦  model artifact logged</text>
  <text x="335" y="398" font-size="9" fill="#6d28d9">register from UI</text>
  <text x="335" y="406" font-size="8" fill="#4c1d95">→ assign Production / Staging</text>

  <!-- ── PARENT 3: Random Forest ── -->
  <rect x="580" y="94" width="240" height="330" rx="8" fill="#0a1a0d" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="580" y="94" width="240" height="32" rx="8" fill="#14532d"/>
  <rect x="580" y="114" width="240" height="12" fill="#14532d"/>
  <text x="700" y="114" text-anchor="middle" font-size="12" fill="#86efac" font-weight="bold">Random_Forest</text>
  <text x="700" y="130" text-anchor="middle" font-size="9" fill="#4ade80" letter-spacing="1">PARENT RUN</text>

  <rect x="595" y="140" width="210" height="24" rx="4" fill="#071009" stroke="#1a3d22" stroke-width="1"/>
  <text x="605" y="156" font-size="9" fill="#64748b">n_estimators=100</text>

  <rect x="595" y="170" width="210" height="24" rx="4" fill="#071009" stroke="#1a3d22" stroke-width="1"/>
  <text x="605" y="186" font-size="9" fill="#64748b">n_estimators=200</text>

  <rect x="595" y="200" width="210" height="24" rx="4" fill="#071009" stroke="#1a3d22" stroke-width="1"/>
  <text x="605" y="216" font-size="9" fill="#64748b">n_estimators=500</text>

  <rect x="595" y="326" width="210" height="32" rx="4" fill="#0c2d1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="605" y="342" font-size="9" fill="#22c55e" font-weight="bold">★  best child metrics</text>
  <text x="605" y="356" font-size="9" fill="#4ade80">bubbled up to parent run</text>

  <rect x="595" y="368" width="210" height="42" rx="4" fill="#1a1025" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="605" y="384" font-size="9" fill="#a78bfa">📦  model artifact logged</text>
  <text x="605" y="398" font-size="9" fill="#6d28d9">register from UI</text>
  <text x="605" y="406" font-size="8" fill="#4c1d95">→ assign Production / Staging</text>

  <!-- legend -->
  <rect x="40" y="436" width="10" height="10" rx="2" fill="#0c2d1a" stroke="#22c55e" stroke-width="1.2"/>
  <text x="56" y="445" font-size="9" fill="#64748b">best child bubbled to parent</text>
  <rect x="220" y="436" width="10" height="10" rx="2" fill="#1a1025" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="236" y="445" font-size="9" fill="#64748b">model artifact (for registry)</text>
  <text x="460" y="445" font-size="9" fill="#334155">child runs: val metrics from 3-fold CV  ·  test metrics from holdout set</text>

</svg>
